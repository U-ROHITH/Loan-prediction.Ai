services:
  - type: web
    name: loan-prediction-ai
    runtime: python
    rootDir: .
    buildCommand: pip install -r requirements.txt && python manage.py migrate --run-syncdb && python manage.py collectstatic --no-input
    startCommand: gunicorn loan_project.wsgi
    envVars:
      - key: DJANGO_ENV
        value: production
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_HOST
        value: loan-prediction-ai.onrender.com
      - key: PYTHON_VERSION
        value: "3.12.0"
